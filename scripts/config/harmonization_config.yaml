  # trial_constants.treatment=atezo+bev) lives in git history.

# ─────────────────────────────────────────────────────────────────────────────
# Global value-normalizations. Applied AFTER per-trial column mapping. Each
# entry maps an observed input value (case-insensitive substring or exact
# match) to a canonical harmonized value, with a confidence score.
#
# The pipeline applies the FIRST matching rule. If no rule matches, the input
# is passed through (preserving template-anomalous casing).
# ─────────────────────────────────────────────────────────────────────────────
value_normalizations:

  race:
    # Each rule: {match: ..., value: ..., kind: exact|prefix|contains|regex, confidence: 0–1}
    - {match: "W",                                value: "white",  kind: exact,    confidence: 1.00, note: "CIDC code W=White"}
    - {match: "B",                                value: "black",  kind: exact,    confidence: 1.00, note: "CIDC code B=Black"}
    - {match: "A",                                value: "asian",  kind: exact,    confidence: 1.00, note: "CIDC code A=Asian"}
    - {match: "I",                                value: "amerind",kind: exact,    confidence: 0.90, note: "CIDC code I=American Indian or Alaska Native"}
    - {match: "U",                                value: "unk",    kind: exact,    confidence: 0.90, note: "CIDC code U=Unknown"}
    - {match: "white",                            value: "white",  kind: iexact,   confidence: 1.00}
    - {match: "black or african american",        value: "black",  kind: iexact,   confidence: 1.00}
    - {match: "black",                            value: "black",  kind: iexact,   confidence: 1.00}
    - {match: "asian",                            value: "asian",  kind: iexact,   confidence: 1.00}
    - {match: "american indian or alaska native", value: "amerind",kind: iexact,   confidence: 0.95}
    - {match: "Other",                            value: "Other",  kind: iexact,   confidence: 0.95, note: "preserve verbatim per reviewer 2026-05-20 (9204 source 'Other' kept; not mapped to unk)"}
    - {match: "not reported",                     value: "unk",    kind: iexact,   confidence: 0.85}
    - {match: "unknown",                          value: "unk",    kind: iexact,   confidence: 0.95}

  sex:
    - {match: "M",      value: "M",  kind: exact,  confidence: 1.00}
    - {match: "F",      value: "F",  kind: exact,  confidence: 1.00}
    - {match: "Male",   value: "M",  kind: iexact, confidence: 1.00}
    - {match: "Female", value: "F",  kind: iexact, confidence: 1.00}
    # S1400I template stores these uppercase phrases verbatim — DO NOT recode
    # during reproduction; this normalization only applies to the cleaned output
    - {match: "MALE GENDER",   value: "MALE GENDER",   kind: exact, confidence: 1.00, note: "S1400I verbatim"}
    - {match: "FEMALE GENDER", value: "FEMALE GENDER", kind: exact, confidence: 1.00, note: "S1400I verbatim"}

  os_stat:
    - {match: "1",     value: "1", kind: exact,  confidence: 1.00}
    - {match: "0",     value: "0", kind: exact,  confidence: 1.00}
    - {match: "Dead",  value: "1", kind: iexact, confidence: 0.95}
    - {match: "Alive", value: "0", kind: iexact, confidence: 0.95}

  pfs_stat:
    - {match: "1", value: "1", kind: exact, confidence: 1.00}
    - {match: "0", value: "0", kind: exact, confidence: 1.00}

  clinical_benefit:
    # Output column was renamed from BOR → clinical_benefit (reviewer 2026-05-20).
    # The column carries trial-specific short codes (CR/PR/SD/PD/STA/Clin-Ben/Y/N/...)
    # that vary by trial. We do NOT want a closed vocabulary here — only specific
    # rewrites such as the E4412 'Unevaluable [<reason>]' collapse below. Any
    # value not matched by these rules is preserved verbatim via the trailing
    # catch-all passthrough.
    #
    # E4412 source carries "Unevaluable [<reason>]" bracketed labels (8 variants
    # observed). Per reviewer 2026-05-20 these collapse to canonical BOR='other'
    # (lowercase, matching the existing project convention and Edgar's template
    # for these rows). A 'contains' rule covers any bracketed Unevaluable form.
    - {match: "Unevaluable", value: "other", kind: contains, confidence: 0.90, note: "E4412 'Unevaluable [<reason>]' → other (reviewer 2026-05-20)"}
    # Catch-all: any other BOR value passes through verbatim. The `value` key is
    # intentionally omitted so normalize.py returns the input value (see
    # rule.get("value", value)).
    - {match: ".*",         kind: regex, confidence: 0.85, note: "BOR passthrough (no canonical rewrite — preserves trial-specific short codes)"}

  clinical_benefit.binary:
    # Output column was renamed from BOR.binary → clinical_benefit.binary
    # (reviewer 2026-05-20). clinical_benefit → response-bucket. Trial-agnostic.
    # S1400I template lumps INC/NASS/SYMP into NR (not response) along with PD.
    # UE is preserved as "other" (used by EAY131-Z1D for unevaluable).
    # CIMAC-10021 uses pre-binarized BOR values "Clin-Ben"/"No C-B" (P1#4).
    # CRm/CRi (short codes used by 10026 AML/MDS response data): the 10026
    # Data Dictionary (10026-clinical/Data_Dictionary.xlsx, Sheet1, Patient
    # Response Dataset Dictionary, rows 92–94) defines:
    #   CR  = Morphologic Complete Remission
    #   CRi = Morphologic Complete Remission with Incomplete Blood Count Recovery
    #   CRm = Bone Marrow CR
    # All three are forms of Complete Remission and map to R. The full long
    # form "CR with MRD-" and "CR with incomplete count recovery" are also
    # mapped to R for backwards compatibility. (Committed: template-supported
    # via 10026 Data Dictionary; pending final clinical confirmation.)
    R:     [CR, PR, "Complete Response", "Partial Response", UPR, "Unconfirmed Partial Response",
            "Clin-Ben", "Clinical Benefit",
            "Y",                            # P1#8: GU16-257 BOR=Y → R
            "Morphological Complete Remission",   # P3: 9204 (12 rows)
            "Partial Remission",                  # P3: 9204 (4 rows)
            "CRm",                                # 10026 short code (Bone Marrow CR; 10026 Data Dictionary)
            "CRi",                                # 10026 short code (Morphologic CR w/ incomplete count recovery; 10026 Data Dictionary)
            "CR with MRD-",                       # long-form CRm
            "CR with incomplete count recovery"]  # long-form CRi
    SD:    [SD, "Stable Disease", STA, "Stable"]
    NR:    [PD, "Progressive Disease", "Progressive Disease or Relapsed Disease",
            SYMP, "Symptomatic Deterioration",
            INC, "Inconclusive", NASS, "Not Assessable",
            "No C-B", "No Clinical Benefit",
            "N",                            # P1#8: GU16-257 BOR=N → NR
            "Persistent Disease",                 # P3: 9204 (2 rows)
            "Progression"]                        # P3: 9204 (2 rows)
    other: [UE, "Unevaluable", "NE",
            "Not Applicable",               # P3: 9204 (1 row)
            "other", "Other"]               # accepts canonical BOR='other' / 'Other' from value_normalizations.BOR contains-rule (E4412 Unevaluable; reviewer 2026-05-20)

  # bor_bin and pfs_bin are computed by the 120-day landmark rule documented
  # in the top-level `derived_rules` block. The dispatching code lives in
  # scripts/lib/normalize.py (derive_bor_bin / derive_pfs_bin) and the helper
  # scripts/extractors/_helpers.py::emit_unresolved_derived. The two blocks
  # below are intentionally absent — there is no value-map for these fields.
